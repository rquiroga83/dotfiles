classic: false

blocks:
  - permission
  - user
  - size
  - date
  - name

color:
  when: auto
  theme: custom

date: '+%d %b %Y %R'

icons:
  when: auto
  theme: fancy
  separator: ' '

layout: grid

sorting:
  column: name
  reverse: false
  dir-grouping: first

permission: rwx
size: default
total-size: false
header: true
hyperlink: never
symlink-arrow: ⇒
no-symlink: false
dereference: false
indicators: false
